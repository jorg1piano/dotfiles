# ============================================
# tmux config for managing multiple Claude sessions
# ============================================

# --- Better prefix key (optional, Ctrl+a instead of Ctrl+b) ---
# Uncomment these two lines if you prefer Ctrl+a:
# set -g prefix C-a
# unbind C-b

# --- General settings ---
set -g mouse on                          # Enable mouse (click panes, scroll, resize)
set -g base-index 1                      # Windows start at 1, not 0
set -g history-limit 50000               # Lots of scrollback
set -g default-terminal "screen-256color"

# --- Status bar ---
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[bg=colour25,fg=white,bold] #S "
set -g status-right "#{pane_current_path} | %H:%M %d-%b-%y"
set -g status-left-length 20

# Window tabs in status bar
set -g window-status-format " #I:#W "
set -g window-status-current-style "bg=colour25,fg=white,bold"
set -g window-status-current-format " #I:#W "

# --- Easy window navigation ---
# Alt+1/2/3/4 to jump to a window directly
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4

# Alt+Left/Right to move between windows
bind -n M-Left previous-window
bind -n M-Right next-window

# When renaming start with no name
bind-key , command-prompt -p "rename-window:" "rename-window '%%'"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Jump to first session, first window
bind h run-shell "SESSION=\$(tmux list-sessions -F '#{session_name}' | head -1); tmux switch-client -t \$SESSION:1"

# Find windows by git branch (popup with fzf)
bind b display-popup -E -w 80% -h 60% "bash ~/dotfiles/scripts/tmux-find-branch.sh"

# Branch cycle mode: prefix+B enters mode, b finds ticket from clipboard, arrows cycle
bind B switch-client -T branch-cycle
bind -T branch-cycle b run-shell "bash ~/dotfiles/scripts/tmux-branch-cycle.sh init" \; switch-client -T branch-cycle
bind -T branch-cycle Right run-shell "bash ~/dotfiles/scripts/tmux-branch-cycle.sh next" \; switch-client -T branch-cycle
bind -T branch-cycle Left run-shell "bash ~/dotfiles/scripts/tmux-branch-cycle.sh prev" \; switch-client -T branch-cycle

# nicer view for leader + w
bind-key w choose-tree -ZwF "#{?pane_format,,#{?window_format,  #[fg=white]#{window_name}#[default],#[fg=magenta]#{session_name}#[default]}}"

# Copy mode visual selection style
set-window-option -g mode-style "fg=white,bg=black"

# --- Easy pane splitting (more intuitive keys) ---
# Show pane path menu with prefix+q
bind q display-menu -T "#{pane_current_path}" \
  "Copy path"       c "run-shell 'echo #{pane_current_path} | pbcopy'" \
  "Open in VS Code" v "run-shell 'code #{pane_current_path}'"

# Split panes/windows in current directory (preserves path)
bind | split-window -h -c "#{pane_current_path}" # Horizontal split
bind - split-window -v -c "#{pane_current_path}" # Vertical split
bind '"' split-window -v -c "#{pane_current_path}" # Default vertical split
bind % split-window -h -c "#{pane_current_path}" # Default horizontal split
bind c new-window -c "#{pane_current_path}"      # New window

# --- Window/session naming ---
# Prevent tmux from auto-renaming windows
set-option -g automatic-rename off
set-option -g allow-rename off

set -g pane-border-status top

# Force pane border refresh on directory change
set-hook -g pane-focus-in "refresh-client -S"
set-option -g status-interval 1
# Move window to previous/next session
bind-key S-Left  run-shell "$HOME/dotfiles/tmux/tmux-move-window.sh prev"
bind-key S-Right run-shell "$HOME/dotfiles/tmux/tmux-move-window.sh next"

bind-key -T copy-mode-vi v send-keys -X begin-selection
setw -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-selection
